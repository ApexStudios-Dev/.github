name: Publish Dummy

on:
  workflow_call:
    inputs:
      java-version:
        required: true
        type: string
      java-vendor:
        required: true
        type: string
      artifact-id:
        required: true
        type: string
      display-name:
        required: true
        type: string
      use-self-runner:
        required: true
        type: boolean
        default: true
      build-task:
        required: true
        type: string

jobs:
  generate-vars:
    name: Generate Vars
    uses: ApexStudios-Dev/.github/.github/workflows/_generate-vars.yml@master
    secrets: inherit
    with:
      use-self-runner: ${{ inputs.use-self-runner }}

  build:
    name: Build
    needs: generate-vars
    runs-on: ${{ needs.generate-vars.outputs.runner }}
    steps:
      - name: Checkout Repository
        uses: ApexStudios-Dev/.github/actions/checkout@master

      - name: Setup Java
        uses: ApexStudios-Dev/.github/actions/setup-java@master
        with:
          java-version: ${{ inputs.java-version }}
          java-vendor: ${{ inputs.java-vendor }}

      - name: Setup Gradle
        uses: ApexStudios-Dev/.github/actions/setup-gradle@master
        with:
          use-gradle-cache: ${{ !inputs.use-self-runner }}

      - name: Build with Gradle
        run: ./gradlew ${{ inputs.build-task }}
        env:
          VERSION: ${{ needs.generate-vars.outputs.version }}

      - name: Log files
        run: ls -Ra

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          path: 'build/libs/${{ inputs.artifact-id }}-${{ needs.generate-vars.outputs.version }}.jar'
          if-no-files-found: 'error'
          name: ${{ inputs.artifact-id }}-${{ needs.generate-vars.outputs.version }}

